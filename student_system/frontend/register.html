<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration - Sign Up</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="form-card">
            <div class="header">
                <h1>📝 Student Registration</h1>
                <p>Create your account to get started</p>
            </div>
            
            <div class="form-body">
                <div id="messageArea"></div>
                
                <form id="registrationForm" action="register-process.php" method="POST">
                    <div class="form-group">
                        <label>First Name <span class="required">*</span></label>
                        <input type="text" name="first_name" id="first_name" required>
                    </div>

                    <div class="form-group">
                        <label>Last Name <span class="required">*</span></label>
                        <input type="text" name="last_name" id="last_name" required>
                    </div>

                    <div class="form-group">
                        <label>Email Address <span class="required">*</span></label>
                        <input type="email" name="email" id="email" required>
                    </div>

                    <div class="form-group">
                        <label>Password <span class="required">*</span></label>
                        <input type="password" name="password" id="password" required>
                        <small>Minimum 6 characters</small>
                    </div>

                    <div class="form-group">
                        <label>Confirm Password <span class="required">*</span></label>
                        <input type="password" name="confirm_password" id="confirm_password" required>
                    </div>

                    <div class="form-group">
                        <label>Department <span class="required">*</span></label>
                        <select name="department" id="department" required>
                            <option value="">Select Department</option>
                            <option value="Computer Science">Computer Science</option>
                            <option value="Information Technology">Information Technology</option>
                            <option value="Software Engineering">Software Engineering</option>
                            <option value="Data Science">Data Science</option>
                            <option value="Cybersecurity">Cybersecurity</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Gender <span class="required">*</span></label>
                        <div class="radio-group">
                            <div class="radio-option">
                                <input type="radio" name="gender" value="male" id="male">
                                <label for="male">👨 Male</label>
                            </div>
                            <div class="radio-option">
                                <input type="radio" name="gender" value="female" id="female">
                                <label for="female">👩 Female</label>
                            </div>
                            <div class="radio-option">
                                <input type="radio" name="gender" value="other" id="other">
                                <label for="other">🌈 Other</label>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Hobbies</label>
                        <div class="checkbox-group">
                            <div class="checkbox-option">
                                <input type="checkbox" name="hobbies[]" value="Reading" id="reading">
                                <label for="reading">📚 Reading</label>
                            </div>
                            <div class="checkbox-option">
                                <input type="checkbox" name="hobbies[]" value="Sports" id="sports">
                                <label for="sports">⚽ Sports</label>
                            </div>
                            <div class="checkbox-option">
                                <input type="checkbox" name="hobbies[]" value="Music" id="music">
                                <label for="music">🎵 Music</label>
                            </div>
                            <div class="checkbox-option">
                                <input type="checkbox" name="hobbies[]" value="Travel" id="travel">
                                <label for="travel">✈️ Travel</label>
                            </div>
                            <div class="checkbox-option">
                                <input type="checkbox" name="hobbies[]" value="Gaming" id="gaming">
                                <label for="gaming">🎮 Gaming</label>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn">Register Now</button>
                </form>

                <div class="login-link">
                    Already have an account? <a href="login.html">Login here</a>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
